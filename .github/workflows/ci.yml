name: CI — Testes e Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Backend: Lint + Testes ──────────────────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: reqstudio
          POSTGRES_PASSWORD: reqstudio
          POSTGRES_DB: reqstudio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: reqstudio/reqstudio-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: reqstudio/reqstudio-api/requirements.txt

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Lint (ruff)
        run: ruff check app/ tests/

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://reqstudio:reqstudio@localhost:5432/reqstudio
          DATABASE_TEST_URL: postgresql+asyncpg://reqstudio:reqstudio@localhost:5432/reqstudio_test
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
          DEBUG: "true"
        run: pytest tests/ -v --tb=short

  # ── Frontend: Build ─────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: reqstudio/reqstudio-ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: reqstudio/reqstudio-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_URL: http://localhost:8000
        run: npm run build

  # ── Docker Build Validation ─────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t reqstudio-api:ci reqstudio/reqstudio-api/

      - name: Build Frontend image
        run: docker build -t reqstudio-frontend:ci reqstudio/reqstudio-ui/
