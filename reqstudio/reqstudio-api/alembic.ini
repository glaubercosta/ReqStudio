# Alembic Configuration

[alembic]
# Path to migration scripts.
script_location = alembic

# Template used to generate migration file names.
# Uncomment below to use timestamps:
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# sys.path to prepend — needed to import app modules
prepend_sys_path = .

# Timezone for file_template timestamps (defaults to utc).
# timezone =

# Max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# Set to 'true' to run environment setup for 'revision'
# revision_environment = false

# Set to 'true' to allow .hierarchical.pyc files in the versions dir
# sourceless = false

# Version path separator — OS, space, or :, ;
# version_path_separator = os

# Output encoding used when revision files are written from script.py.mako
# output_encoding = utf-8

# URL is overridden in env.py via Settings
sqlalchemy.url = postgresql+asyncpg://reqstudio:reqstudio@db:5432/reqstudio


[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.

# Runs Ruff formatting on each new revision.
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
